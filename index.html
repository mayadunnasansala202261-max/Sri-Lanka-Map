<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Sri Lanka — Live Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://api.open-meteo.com">
<link rel="preconnect" href="https://air-quality-api.open-meteo.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#050B09;
    --surface: rgba(4,12,10,0.78);
    --surface-solid:#071310;
    --ocean:#040F14;
    --lowland:#59B066;
    --highland:#0A4519;
    --coral:#E8613D;
    --gold:#E8A33D;
    --cream:#F4EDE1;
    --muted:#7C9088;
    --line: rgba(244,237,225,0.09);
    --good:#4CB944; --moderate:#F4C430; --usg:#F28C28; --unhealthy:#E8412C; --very:#8F3F97; --hazard:#7E2338;
  }
  html[data-theme="light"]{
    --ink:#F3F7F4;
    --surface: rgba(255,255,255,0.78);
    --surface-solid:#FFFFFF;
    --ocean:#BFE0EA;
    --lowland:#59B066;
    --highland:#0A4519;
    --coral:#D6502F;
    --gold:#B9791E;
    --cream:#12241C;
    --muted:#5C6B64;
    --line: rgba(18,36,28,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--ink);overflow:hidden;font-family:'Inter',sans-serif;}
  body{transition:background-color .35s ease;}
  #stage, #statspanel, #legend, #panel, .citylabel .tag, .citylabel .dot{transition:background-color .35s ease, border-color .35s ease, color .35s ease;}
  #stage{position:fixed;inset:0;touch-action:none;overscroll-behavior:none;}
  canvas{display:block;touch-action:none;}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--gold); font-weight:500;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:500; font-optical-sizing:auto;
    font-size:28px; line-height:1.05; color:var(--cream); margin:4px 0 0 0;
    letter-spacing:-0.01em;
  }

  #topbar{
    position:fixed; top:22px; left:24px; right:24px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:20;
  }
  #topbar > *{pointer-events:auto;}

  #titleblock{max-width:360px;}
  #titleblock p{color:var(--muted); font-size:13px; line-height:1.5; margin:10px 0 0 0; max-width:320px;}

  #citySearch{position:relative; margin-top:12px; max-width:260px;}
  #citySuggestions{
    position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:25;
    background:var(--surface-solid); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; max-height:220px; overflow-y:auto; display:none;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
  }
  #citySuggestions.show{display:block;}
  #citySuggestions button{
    display:flex; justify-content:space-between; align-items:center; width:100%;
    background:none; border:none; text-align:left; cursor:pointer;
    padding:11px 14px; font-family:'Inter',sans-serif; font-size:13px; color:var(--cream);
    border-bottom:1px solid var(--line);
  }
  #citySuggestions button:last-child{border-bottom:none;}
  #citySuggestions button:hover, #citySuggestions button:active, #citySuggestions button.active{background:rgba(232,163,61,0.14);}
  #citySuggestions button .region{color:var(--muted); font-size:11px; font-family:'IBM Plex Mono',monospace;}
  #citySearch input{
    width:100%; background:var(--surface); backdrop-filter:blur(14px);
    border:1px solid var(--line); border-radius:20px; padding:9px 16px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--cream);
    outline:none; -webkit-appearance:none;
  }
  #citySearch input::placeholder{color:var(--muted);}
  #citySearch input:focus{border-color:var(--gold);}
  #citySearch input.no-match{border-color:var(--coral); animation:searchShake .35s;}
  @keyframes searchShake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    75%{transform:translateX(4px);}
  }
  /* hide the native calendar/search icons some mobile browsers add */
  #citySearch input::-webkit-calendar-picker-indicator{display:none;}

  #statspanel{
    position:relative;
    background:var(--surface); backdrop-filter:blur(14px);
    border:1px solid var(--line); border-radius:14px;
    padding:14px 18px; min-width:210px;
    font-family:'IBM Plex Mono',monospace;
  }
  #statspanel .row{display:flex; justify-content:space-between; gap:18px; font-size:12px; color:var(--muted); padding:3px 0;}
  #statspanel .row b{color:var(--cream); font-weight:500;}
  #statspanel .statshead{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
  #statspanel .clock{color:var(--gold); font-size:13px; display:block;}

  #themeToggleBtn{
    position:static; flex-shrink:0; width:28px; height:28px; border-radius:50%;
    border:1px solid var(--line); background:var(--surface-solid); color:var(--cream);
    font-size:13px; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
  }

  #legend{
    position:fixed; left:24px; bottom:24px; z-index:20;
    background:var(--surface); backdrop-filter:blur(14px);
    border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; max-width:260px;
  }
  #legend .eyebrow{margin-bottom:8px; display:block;}
  #legend .scale{display:flex; height:8px; border-radius:4px; overflow:hidden; margin-bottom:6px;}
  #legend .scale span{flex:1;}
  #legend .labels{display:flex; justify-content:space-between; font-size:9px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  #modetoggle{
    margin-top:12px; display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;
  }
  #modetoggle button{
    flex:1; background:transparent; border:none; color:var(--muted); font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase; padding:7px 4px; cursor:pointer; transition:all .2s;
  }
  #modetoggle button.active{background:var(--gold); color:var(--ink); font-weight:600;}

  #hint{
    position:fixed; right:24px; bottom:24px; z-index:20;
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted);
    letter-spacing:0.05em; text-align:right; line-height:1.6;
  }

  .citylabel{
    position:absolute; transform:translate(-50%,-100%); pointer-events:auto; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; z-index:10; user-select:none;
  }
  .citylabel .dot{
    width:11px; height:11px; border-radius:50%; border:2px solid var(--ink); box-shadow:0 0 0 2px rgba(244,237,225,0.5);
    background:#888; transition:transform .15s;
  }
  .citylabel:hover .dot{transform:scale(1.35);}
  .citylabel .pulse{
    position:absolute; width:11px; height:11px; border-radius:50%; top:0; left:0;
    animation:pulse 2.2s ease-out infinite; background:#888;
  }
  @keyframes pulse{
    0%{transform:scale(1); opacity:0.7;}
    100%{transform:scale(2.8); opacity:0;}
  }
  .citylabel .tag{
    margin-bottom:5px; background:var(--surface-solid); border:1px solid var(--line);
    border-radius:20px; padding:3px 9px 3px 7px; display:flex; align-items:center; gap:5px;
    font-size:11px; color:var(--cream); white-space:nowrap; font-family:'IBM Plex Mono',monospace;
    opacity:0.92;
  }
  .citylabel .tag .name{font-family:'Inter',sans-serif; font-weight:600; font-size:11px;}
  .citylabel .tag .temp{color:var(--gold);}
  .citylabel .tag .aqi{
    font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; letter-spacing:0.02em;
  }
  .citylabel .tag .rain{
    font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; color:#BFD9EE; display:none;
  }
  .citylabel .tag .rain.show{display:inline-block;}
  .citylabel.selected .tag{border-color:var(--gold);}

  #panel{
    position:fixed; top:0; right:0; height:100%; width:340px; z-index:30;
    background:var(--surface-solid); border-left:1px solid var(--line);
    transform:translateX(100%); transition:transform .35s cubic-bezier(.2,.8,.2,1);
    padding:28px 26px; overflow-y:auto;
  }
  #panel.open{transform:translateX(0);}
  #panel .close{
    position:absolute; top:20px; right:22px; background:none; border:none; color:var(--muted);
    font-size:20px; cursor:pointer; line-height:1;
  }
  #panel .region{color:var(--muted); font-size:12px; margin-top:2px;}
  #panel .bigtemp{
    font-family:'Fraunces',serif; font-size:64px; font-weight:300; color:var(--cream); margin:18px 0 0 0; line-height:1;
  }
  #panel .desc{color:var(--gold); font-size:14px; margin-top:6px; font-family:'IBM Plex Mono',monospace;}
  #panel .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:24px;}
  #panel .card{background:rgba(244,237,225,0.04); border:1px solid var(--line); border-radius:10px; padding:12px 14px;}
  #panel .card .k{font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  #panel .card .v{font-size:19px; color:var(--cream); margin-top:4px; font-family:'Fraunces',serif;}
  #panel .aqibox{margin-top:22px; border-radius:10px; padding:16px; border:1px solid var(--line);}
  #panel .aqibox .k{font-size:10px; letter-spacing:0.08em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; opacity:0.85;}
  #panel .aqibox .v{font-family:'Fraunces',serif; font-size:34px; margin-top:4px;}
  #panel .aqibox .cat{font-size:13px; margin-top:2px; font-weight:600;}
  #panel .updated{margin-top:20px; font-size:10px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  #panel .loading{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-top:30px;}

  #loadscreen{
    position:fixed; inset:0; background:var(--ink); z-index:100;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
    transition:opacity .6s ease;
  }
  #loadscreen .eyebrow{color:var(--gold);}
  #loadscreen .barwrap{width:220px; height:2px; background:rgba(244,237,225,0.12); border-radius:2px; overflow:hidden;}
  #loadscreen .bar{height:100%; width:30%; background:var(--gold); animation:load 1.1s ease-in-out infinite;}
  @keyframes load{0%{transform:translateX(-100%);}100%{transform:translateX(340%);}}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(244,237,225,0.15); border-radius:3px;}

  /* ---------------------------------------------------------------------
     RESPONSIVE — tablets & large phones
     On narrow screens the stats box used to float on top of the map and
     hide the northern stations behind it. Below this width we stop
     floating it: it becomes a normal in-flow header, and the map (#stage)
     gets position:relative + flex so it fills exactly the leftover
     viewport height underneath, fully visible instead of hidden behind it.
  --------------------------------------------------------------------- */
  @media (max-width: 760px){
    html,body{height:100%;}
    body{display:flex; flex-direction:column;}
    #topbar{
      position:static; top:auto; left:auto; right:auto;
      padding:max(10px, env(safe-area-inset-top)) 14px 8px;
      flex-direction:column; align-items:stretch; gap:8px;
      background:var(--surface-solid); border-bottom:1px solid var(--line);
      z-index:5; flex:0 0 auto;
      order:1; /* header always first, above the map */
    }
    #titleblock{max-width:100%;}
    #titleblock p{display:none;} /* tagline dropped on mobile to give the map more height */
    h1{font-size:19px; margin-top:2px;}
    .eyebrow{font-size:10px;}
    #statspanel{width:100%; min-width:0; padding:10px 16px;}
    #statspanel .statshead{margin-bottom:5px;}
    #statspanel .row{padding:2px 0;}
    #citySearch{max-width:100%; margin-top:8px;}
    #stage{
      position:relative; inset:auto;
      flex:1 1 auto; min-height:0; width:100%;
      order:2; /* map fills the leftover space below the header */
    }
    #legend{
      left:14px; right:14px; bottom:max(14px, env(safe-area-inset-bottom)); max-width:none;
    }
    #hint{display:none;}
    #panel{width:100%;}
    #panel .grid{grid-template-columns:1fr;} /* stack detail cards one under another */
    #modetoggle button{padding:9px 4px;}
  }

  /* ---------------------------------------------------------------------
     RESPONSIVE — small phones
  --------------------------------------------------------------------- */
  @media (max-width: 420px){
    h1{font-size:18px;}
    .eyebrow{font-size:9px;}
    #statspanel{padding:9px 14px;}
    #statspanel .row{font-size:11px;}
    #legend{padding:12px 14px;}
    .citylabel .tag{font-size:10px; padding:2px 7px 2px 6px;}
    .citylabel .tag .name{font-size:10px;}
    #panel{padding:22px 18px;}
    #panel .bigtemp{font-size:48px;}
  }

  @media (max-width: 760px) and (min-width: 421px){
    #hint{
      display:block; position:fixed; right:14px; bottom:auto; top:max(14px, env(safe-area-inset-top));
      font-size:9px; opacity:0.7;
    }
  }

  /* comfortable tap targets on touch devices */
  @media (pointer: coarse){
    #modetoggle button{min-height:38px;}
    #themeToggleBtn{width:34px; height:34px; font-size:15px;}
    #panel .close{padding:6px; font-size:22px;}
    .citylabel .dot{width:14px; height:14px;}
  }
</style>
</head>
<body>

<div id="loadscreen">
  <span class="eyebrow">Sri Lanka · Live Terrain</span>
  <div class="barwrap"><div class="bar"></div></div>
</div>

<div id="stage"></div>

<div id="topbar">
  <div id="titleblock">
    <span class="eyebrow">01°N — Indian Ocean</span>
    <h1>Sri Lanka,<br/>sensed live</h1>
    <p>MAYA MAP</p>
    <div id="citySearch">
      <input id="citySearchInput" type="text" placeholder="Search a city…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" aria-label="Search for a city" />
      <div id="citySuggestions" role="listbox"></div>
    </div>
  </div>
  <div id="statspanel">
    <div class="statshead">
      <span class="clock" id="clock">--:--:--</span>
      <button id="themeToggleBtn" aria-label="Toggle dark/light theme">🌙</button>
    </div>
    <div class="row"><span>Stations reporting</span><b id="statReporting">0 / 25</b></div>
    <div class="row"><span>Island avg. temp</span><b id="statTemp">—</b></div>
    <div class="row"><span>Warmest station</span><b id="statWarm">—</b></div>
    <div class="row"><span>Wettest station</span><b id="statRain">—</b></div>
    <div class="row"><span>Air to watch</span><b id="statAQI">—</b></div>
  </div>
</div>

<div id="legend">
  <span class="eyebrow" id="legendTitle">Air Quality Index</span>
  <div class="scale" id="legendScale"></div>
  <div class="labels" id="legendLabels"><span>Good</span><span>Hazardous</span></div>
  <div id="modetoggle">
    <button id="btnAQI" class="active">Air Quality</button>
    <button id="btnTemp">Temperature</button>
    <button id="btnRain">Rainfall</button>
  </div>
</div>

<div id="hint">drag to rotate · scroll / pinch to zoom<br/>double-tap a station to zoom in</div>

<div id="panel">
  <button class="close" id="panelClose">✕</button>
  <span class="eyebrow" id="pName">—</span>
  <div class="region" id="pRegion">—</div>
  <div class="bigtemp" id="pTemp">—</div>
  <div class="desc" id="pDesc">—</div>
  <div id="pBody"></div>
</div>

<div id="labels"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

/* ---------------------------------------------------------------------
   PROJECTION  (lon/lat -> world x/z)
--------------------------------------------------------------------- */
const CENTER_LON = 80.735, CENTER_LAT = 7.875;
const SCALE = 42;
const COS_LAT = Math.cos(CENTER_LAT * Math.PI/180);
function project(lon,lat){
  const x = (lon - CENTER_LON) * SCALE * COS_LAT;
  const z = (CENTER_LAT - lat) * SCALE;
  return {x,z};
}

/* ---------------------------------------------------------------------
   LAND-LOCK HELPERS
   The coastline above is a deliberately simplified (~110 point) outline,
   so a handful of real district-capital coordinates (e.g. peninsulas,
   lagoon-side towns) can fall just outside that simplified shape even
   though the lat/lon itself is correct. These helpers detect that and
   nudge the *visual* pin inward so every marker sits on the rendered
   landmass, without touching the real coordinates used for weather data.
--------------------------------------------------------------------- */
function pointInPolygon(x, y, poly){
  let inside = false;
  for(let i=0, j=poly.length-1; i<poly.length; j=i++){
    const xi=poly[i].x, yi=poly[i].y, xj=poly[j].x, yj=poly[j].y;
    const intersect = ((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}
function closestPointOnSegment(px,py, ax,ay, bx,by){
  const abx=bx-ax, aby=by-ay;
  const denom = abx*abx+aby*aby || 1;
  const t = Math.max(0, Math.min(1, ((px-ax)*abx+(py-ay)*aby)/denom));
  return {x:ax+abx*t, y:ay+aby*t};
}
function nearestPolygonPoint(x,y, poly){
  let best=null, bestD=Infinity;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const c = closestPointOnSegment(x,y, poly[j].x,poly[j].y, poly[i].x,poly[i].y);
    const d = (c.x-x)**2+(c.y-y)**2;
    if(d<bestD){bestD=d; best=c;}
  }
  return best;
}
let _centroidX=0, _centroidZ=0;
shapePts.forEach(p=>{_centroidX+=p.x; _centroidZ+=p.y;});
_centroidX/=shapePts.length; _centroidZ/=shapePts.length;
function landPosition(x,z){
  if(pointInPolygon(x,z,shapePts)) return {x,z};
  const nearest = nearestPolygonPoint(x,z,shapePts);
  const dx = _centroidX-nearest.x, dz = _centroidZ-nearest.y;
  const len = Math.hypot(dx,dz) || 1;
  let nx=nearest.x, nz=nearest.y;
  for(let step=1; step<=8; step++){
    nx = nearest.x + (dx/len)*(step*0.8);
    nz = nearest.y + (dz/len)*(step*0.8);
    if(pointInPolygon(nx,nz,shapePts)) break;
  }
  return {x:nx, z:nz};
}

/* ---------------------------------------------------------------------
   CAMERA CONTROLS (custom orbit)
--------------------------------------------------------------------- */
let azimuth = 0, polar = 0.95, radius = 165; // azimuth 0 = true north-up, matching a standard map
// azimuthTarget/polarTarget are what your finger/mouse is asking for; azimuth/polar
// (the values the camera actually uses) ease toward them every frame. This is what
// makes rotation feel smooth even when raw pointermove events arrive unevenly on
// mobile, and it also lets us keep spinning briefly (momentum) after you let go.
let azimuthTarget = azimuth, polarTarget = polar;
let azimVelocity = 0, polarVelocity = 0;
let targetRadius = radius;
const target = new THREE.Vector3(0, DEPTH*0.5, 0);
const targetLook = new THREE.Vector3(0, DEPTH*0.5, 0);
let dragging=false, lastX=0,lastY=0, autoRotate=false; // off by default: keeps north-up orientation matching a real map; drag to rotate manually

// fit the island in view better on narrow/portrait phone screens
if(window.innerWidth < 760){
  radius = targetRadius = 210;
}

function updateCamera(){
  // ease radius and look target toward their goals (used by flyTo / scroll)
  radius += (targetRadius-radius)*0.08;
  target.lerp(targetLook, 0.08);
  const p = polar;
  camera.position.x = target.x + radius*Math.sin(p)*Math.sin(azimuth);
  camera.position.y = target.y + radius*Math.cos(p);
  camera.position.z = target.z + radius*Math.sin(p)*Math.cos(azimuth);
  camera.lookAt(target);
}
updateCamera();

function flyTo(cityId){
  const m = cityMarkers.find(c=>c.id===cityId);
  if(!m) return;
  autoRotate = false;
  targetLook.set(m.worldPos.x, DEPTH*0.6, m.worldPos.z);
  targetRadius = 32;
  selectCity(cityId);
}

const citySearchInput = document.getElementById('citySearchInput');

function matchCities(query, limit=6){
  const q = query.trim().toLowerCase();
  if(!q) return [];
  const starts = CITIES.filter(c=>c.name.toLowerCase().startsWith(q));
  const includes = CITIES.filter(c=>!c.name.toLowerCase().startsWith(q) && c.name.toLowerCase().includes(q));
  return [...starts, ...includes].slice(0, limit);
}
function findCity(query){
  const q = query.trim().toLowerCase();
  if(!q) return null;
  return CITIES.find(c=>c.name.toLowerCase()===q) || matchCities(query, 1)[0] || null;
}

// picking a city: used by both a suggestion tap and a confirmed text search —
// this is the single path that actually opens the side panel, so both routes
// on mobile are guaranteed to behave the same as clicking a marker directly.
function pickCity(match){
  hideSuggestions();
  flyTo(match.id);
  citySearchInput.value = match.name;
  citySearchInput.blur();
}

function renderSuggestions(){
  const matches = matchCities(citySearchInput.value);
  if(!matches.length){ hideSuggestions(); return; }
  citySuggestions.innerHTML = matches.map(c=>
    `<button type="button" data-id="${c.id}"><span>${c.name}</span><span class="region">${c.region||''}</span></button>`
  ).join('');
  citySuggestions.classList.add('show');
}
function hideSuggestions(){ citySuggestions.classList.remove('show'); citySuggestions.innerHTML=''; }

// mousedown (not click) fires before the input's blur, so a tap on a
// suggestion registers reliably even on mobile browsers that aggressively
// blur/close the keyboard the moment a finger lifts off the input
citySuggestions.addEventListener('mousedown', e=>{
  const btn = e.target.closest('button[data-id]');
  if(!btn) return;
  e.preventDefault();
  const match = CITIES.find(c=>c.id===btn.dataset.id);
  if(match) pickCity(match);
});
citySuggestions.addEventListener('touchstart', e=>{
  const btn = e.target.closest('button[data-id]');
  if(!btn) return;
  const match = CITIES.find(c=>c.id===btn.dataset.id);
  if(match) pickCity(match);
}, {passive:true});

function runCitySearch(){
  const match = findCity(citySearchInput.value);
  if(match){
    pickCity(match);
  } else if(citySearchInput.value.trim()){
    hideSuggestions();
    citySearchInput.classList.remove('no-match');

    citySearchInput.classList.add('no-match');

}

function resetView(){
  autoRotate = false;
  azimuthTarget = 0; // back to true north-up (azimuth itself eases toward this)
  azimVelocity = 0; polarVelocity = 0;

/* ---------------------------------------------------------------------
   POINTER CONTROLS (unified mouse + touch via the Pointer Events API)
   Previously this mixed pointerdown/move handlers (for drag-rotate) with
   separate raw touchstart/touchmove handlers (for pinch-zoom). Both
   models fire independently for the same fingers, and a second finger
   landing re-triggered the drag handler's pointerdown before the pinch
   handler could take over — causing a brief huge rotation jump that
   looked like the cities "flying" across the map. Tracking every active
   pointer in one Map removes that race entirely.
--------------------------------------------------------------------- */
const activePointers = new Map(); // pointerId -> {x,y}
let pinchStartDist = null, pinchStartRadius = null;

function pinchDistance(){
  const pts = [...activePointers.values()];
  return Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
}

// Touch needs a noticeably higher drag-to-rotation ratio than a mouse — a mouse
// drag spans the whole screen easily, a thumb swipe covers a lot less distance,
// so the old single 0.0045 factor made the map feel stiff and hard to turn on
// phones. Scale per-pointer by input type instead of one fixed constant.
function rotateSensitivity(e){
  return e.pointerType === 'touch' ? 0.0075 : (e.pointerType === 'pen' ? 0.006 : 0.0045);
}

renderer.domElement.addEventListener('pointerdown', e=>{
  renderer.domElement.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  autoRotate = false;
  if(activePointers.size===1){
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    azimVelocity = 0; polarVelocity = 0; // kill any residual momentum, a fresh grab takes over
  } else if(activePointers.size===2){
    dragging = false; // hand off from single-finger rotate to two-finger pinch
    pinchStartDist = pinchDistance();
    pinchStartRadius = targetRadius;
  }
});

renderer.domElement.addEventListener('pointermove', e=>{
  if(!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(activePointers.size>=2){
    const dist = pinchDistance();
    if(pinchStartDist){
      targetRadius = Math.min(280, Math.max(18, pinchStartRadius*(pinchStartDist/dist)));
    }
    return;
  }
  if(dragging){
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    const sens = rotateSensitivity(e);
    const dAz = -dx*sens;
    const dPol = -dy*sens*0.78;
    // drive the *target*, not the camera value directly — updateCamera() eases
    // azimuth/polar toward these every frame, which smooths out the uneven
    // spacing of real pointermove events into one fluid motion.
    azimuthTarget += dAz;
    polarTarget = Math.min(1.35, Math.max(0.35, polarTarget + dPol));
    azimVelocity = dAz; polarVelocity = dPol; // remembered for a momentum flick on release
    lastX = e.clientX; lastY = e.clientY;
  }
});

function releasePointer(e){
  activePointers.delete(e.pointerId);
  pinchStartDist = null;
  if(activePointers.size===1){
    // resume single-finger drag smoothly from the remaining finger's position
    const [remaining] = activePointers.values();
    dragging = true;
    lastX = remaining.x; lastY = remaining.y;
    azimVelocity = 0; polarVelocity = 0;
  } else {
    dragging = false; // momentum (azimVelocity/polarVelocity) keeps spinning briefly, see animate()
  }
}
renderer.domElement.addEventListener('pointerup', releasePointer);
renderer.domElement.addEventListener('pointercancel', releasePointer);
renderer.domElement.addEventListener('pointerleave', releasePointer);

renderer.domElement.addEventListener('wheel', e=>{
  e.preventDefault();
  targetRadius = Math.min(280, Math.max(18, targetRadius + e.deltaY*0.12));
},{passive:false});

function pointerToNDC(e){
  const rect = stage.getBoundingClientRect();
  mouseNDC.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouseNDC.y = -((e.clientY-rect.top)/rect.height)*2+1;
}

renderer.domElement.addEventListener('dblclick', e=>{
  pointerToNDC(e);
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(cityMarkers.map(m=>m.pin));
  if(hits.length){
    const m = cityMarkers.find(cm=>cm.pin===hits[0].object);
    if(m) flyTo(m.id);
  }
});

renderer.domElement.addEventListener('click', e=>{

  }
});

  } else {
    m.aqiEl.textContent = '—';
    m.aqiEl.style.background = 'transparent';
    m.aqiEl.style.color = 'var(--muted)';
  }
  const mm = m.data && m.data.daily ? m.data.daily.precipitation_sum?.[0] : null;
  if(mm!=null && mm >= 0.2){
    m.rainEl.textContent = `☔ ${mm.toFixed(1)}mm`;
    m.rainEl.style.background = rainColor(mm)+'33';
    m.rainEl.style.color = rainColor(mm);
    m.rainEl.classList.add('show');
  } else {
    m.rainEl.classList.remove('show');
  }
}

// Single batched request for every city at once (fast, avoids 50 round trips for 25 stations)
async function loadAll(){
  const latStr = CITIES.map(c=>c.lat).join(',');
  const lonStr = CITIES.map(c=>c.lon).join(',');
  const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latStr}&longitude=${lonStr}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m&daily=precipitation_sum,precipitation_probability_max&forecast_days=1&timezone=auto`;
  const aUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latStr}&longitude=${lonStr}&current=pm10,pm2_5,us_aqi,european_aqi&timezone=auto`;

  let wJson = null, aJson = null;
  try{
    const [wRes, aRes] = await Promise.all([fetch(wUrl), fetch(aUrl)]);
    wJson = await wRes.json();
    aJson = await aRes.json();
  }catch(err){ /* leave nulls, handled below */ }

  CITIES.forEach((c,i)=>{
    const m = cityMarkers.find(x=>x.id===c.id);
    const wEntry = Array.isArray(wJson) ? wJson[i] : wJson;
    const aEntry = Array.isArray(aJson) ? aJson[i] : aJson;
    m.data = {
      weather: wEntry && wEntry.current ? wEntry.current : null,
      daily: wEntry && wEntry.daily ? wEntry.daily : null,
      air: aEntry && aEntry.current ? aEntry.current : null
    };
    m.loading = false;
    loadedCount++;
    paintLabel(m);
    applyMarkerColor(m);
    if(selectedId===c.id) renderPanel(m);
  });
  updateStats();
  document.getElementById('statReporting').textContent = `${loadedCount} / ${CITIES.length}`;
}

function updateStats(){
  const withTemp = cityMarkers.filter(m=>m.data && m.data.weather);
  if(withTemp.length){
    const avg = withTemp.reduce((s,m)=>s+m.data.weather.temperature_2m,0)/withTemp.length;
    document.getElementById('statTemp').textContent = avg.toFixed(1)+'°C';
    const warmest = withTemp.reduce((a,b)=>a.data.weather.temperature_2m>b.data.weather.temperature_2m?a:b);
    document.getElementById('statWarm').textContent = `${warmest.name} ${Math.round(warmest.data.weather.temperature_2m)}°`;
  }
  const withAQI = cityMarkers.filter(m=>m.data && m.data.air && m.data.air.us_aqi!=null);
  if(withAQI.length){
    const worst = withAQI.reduce((a,b)=>a.data.air.us_aqi>b.data.air.us_aqi?a:b);
    document.getElementById('statAQI').textContent = `${worst.name} · ${Math.round(worst.data.air.us_aqi)} AQI`;
  }
  const withRain = cityMarkers.filter(m=>m.data && m.data.daily && m.data.daily.precipitation_sum);
  if(withRain.length){
    const wettest = withRain.reduce((a,b)=>a.data.daily.precipitation_sum[0]>b.data.daily.precipitation_sum[0]?a:b);
    const mm = wettest.data.daily.precipitation_sum[0];
    document.getElementById('statRain').textContent = mm>=0.2 ? `${wettest.name} · ${mm.toFixed(1)}mm` : 'No rain today';
  }
}

/* ---------------------------------------------------------------------
   PANEL / SELECTION
--------------------------------------------------------------------- */
let selectedId = null;
function selectCity(id){
  selectedId = id;
  cityMarkers.forEach(m=>m.el.classList.toggle('selected', m.id===id));
  const m = cityMarkers.find(x=>x.id===id);
  document.getElementById('panel').classList.add('open');
  renderPanel(m);
}
document.getElementById('panelClose').addEventListener('click', ()=>{
  document.getElementById('panel').classList.remove('open');
  cityMarkers.forEach(m=>m.el.classList.remove('selected'));
  selectedId = null;
  resetView();
});

function renderPanel(m){
  document.getElementById('pName').textContent = m.name;
  document.getElementById('pRegion').textContent = m.region;
  const body = document.getElementById('pBody');
  if(m.loading || !m.data || (!m.data.weather && !m.data.air)){
    document.getElementById('pTemp').textContent = '—';
    document.getElementById('pDesc').textContent = '—';
    body.innerHTML = `<div class="loading">Fetching live readings…</div>`;
    return;
  }
  const w = m.data.weather, a = m.data.air;
  if(w){
    const [desc, icon] = wmoInfo(w.weather_code);
    document.getElementById('pTemp').textContent = Math.round(w.temperature_2m)+'°C';
    document.getElementById('pDesc').textContent = `${icon}  ${desc}`;
  } else {
    document.getElementById('pTemp').textContent = 'n/a';
    document.getElementById('pDesc').textContent = 'Weather unavailable';
  }

  let grid = '<div class="grid">';
  if(w){
    grid += `<div class="card"><div class="k">Feels like</div><div class="v">${Math.round(w.apparent_temperature)}°C</div></div>`;
    grid += `<div class="card"><div class="k">Humidity</div><div class="v">${Math.round(w.relative_humidity_2m)}%</div></div>`;
    grid += `<div class="card"><div class="k">Wind</div><div class="v">${Math.round(w.wind_speed_10m)} km/h</div></div>`;
  }
  const d = m.data.daily;
  if(d && d.precipitation_sum){
    const mm = d.precipitation_sum[0];
    const chance = d.precipitation_probability_max ? d.precipitation_probability_max[0] : null;
    grid += `<div class="card"><div class="k">Rain today</div><div class="v" style="color:${rainColor(mm)}">${mm.toFixed(1)} mm</div></div>`;
    if(chance!=null) grid += `<div class="card"><div class="k">Chance of rain</div><div class="v">${Math.round(chance)}%</div></div>`;
  }
  grid += '</div>';
  body.innerHTML = grid;

  if(a && a.us_aqi!=null){
    const cat = aqiCategory(a.us_aqi);
    const color = AQI_COLORS[cat.key];
    body.innerHTML += `
      <div class="aqibox" style="background:${color}22; border-color:${color}66;">
        <div class="k" style="color:${color}">US Air Quality Index</div>
        <div class="v" style="color:${color}">${Math.round(a.us_aqi)}</div>
        <div class="cat" style="color:${color}">${cat.label}</div>
      </div>
      <div class="grid" style="margin-top:12px;">
        <div class="card"><div class="k">PM2.5</div><div class="v">${a.pm2_5 ?? '—'}</div></div>
        <div class="card"><div class="k">PM10</div><div class="v">${a.pm10 ?? '—'}</div></div>
      </div>`;
  }

  const t = w?.time || a?.time;
  body.innerHTML += `<div class="updated">Last updated ${t ? new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—'} local time</div>`;
}

/* ---------------------------------------------------------------------
   DARK / LIGHT THEME TOGGLE
--------------------------------------------------------------------- */
const THEME_COLORS = {
  dark:  { ocean:0x040F14, edge:0xF4EDE1 },
  light: { ocean:0xBFE0EA, edge:0x14261D }
};
const themeToggleBtn = document.getElementById('themeToggleBtn');
let currentTheme = 'dark';
function setTheme(theme){
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  themeToggleBtn.textContent = theme==='dark' ? '🌙' : '☀️';
  oceanMat.color.setHex(THEME_COLORS[theme].ocean);
  edgeMat.color.setHex(THEME_COLORS[theme].edge);
}
themeToggleBtn.addEventListener('click', ()=>setTheme(currentTheme==='dark' ? 'light' : 'dark'));
setTheme('dark'); // dark mode is the default on load, as requested for the login screen

/* ---------------------------------------------------------------------
   VIEW MODE TOGGLE + LEGEND
--------------------------------------------------------------------- */
function buildLegend(){
  const scale = document.getElementById('legendScale');
  const title = document.getElementById('legendTitle');
  const labels = document.getElementById('legendLabels');
  if(viewMode==='aqi'){
    title.textContent = 'Air Quality Index';
    scale.innerHTML = ['good','moderate','usg','unhealthy','very','hazard'].map(k=>`<span style="background:${AQI_COLORS[k]}"></span>`).join('');
    labels.innerHTML = '<span>Good</span><span>Hazardous</span>';
  } else if(viewMode==='rain'){
    title.textContent = 'Rainfall Today';
    scale.innerHTML = ['#8FBFB2','#4FA8D8','#3763B0','#4B2E9E'].map(c=>`<span style="background:${c}"></span>`).join('');
    labels.innerHTML = '<span>Dry</span><span>Heavy</span>';
  } else {
    title.textContent = 'Air Temperature';
    scale.innerHTML = ['#4FA8D8','#4CB944','#F4C430','#E8613D'].map(c=>`<span style="background:${c}"></span>`).join('');
    labels.innerHTML = '<span>Cooler</span><span>Warmer</span>';
  }
}
buildLegend();
const modeButtons = {aqi: document.getElementById('btnAQI'), temp: document.getElementById('btnTemp'), rain: document.getElementById('btnRain')};
function setMode(mode){
  viewMode = mode;
  Object.entries(modeButtons).forEach(([k,btn])=>btn.classList.toggle('active', k===mode));
  buildLegend();
  cityMarkers.forEach(applyMarkerColor);
}
modeButtons.aqi.addEventListener('click', ()=>setMode('aqi'));
modeButtons.temp.addEventListener('click', ()=>setMode('temp'));
modeButtons.rain.addEventListener('click', ()=>setMode('rain'));

/* ---------------------------------------------------------------------
   ANIMATION LOOP
--------------------------------------------------------------------- */
const vec = new THREE.Vector3();
function updateLabels(){
  const rect = stage.getBoundingClientRect(); // stage no longer always == full window (mobile splits header/map)
  for(const m of cityMarkers){
    vec.copy(m.worldPos).applyMatrix4(islandGroup.matrixWorld);
    vec.project(camera);
    const behind = vec.z > 1;
    const x = rect.left + (vec.x*0.5+0.5)*rect.width;
    const y = rect.top + (-vec.y*0.5+0.5)*rect.height;
    m.el.style.left = x+'px';
    m.el.style.top = y+'px';
    m.el.style.display = behind ? 'none' : 'flex';
  }
}

let clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  if(autoRotate) azimuthTarget += 0.0009;

  // momentum: once every finger has lifted, keep coasting on the last swipe's
  // velocity and let it decay, like flicking a real map instead of it stopping dead
  if(!dragging && activePointers.size===0 && (azimVelocity || polarVelocity)){
    azimuthTarget += azimVelocity;
    polarTarget = Math.min(1.35, Math.max(0.35, polarTarget + polarVelocity));
    azimVelocity *= 0.92; polarVelocity *= 0.92;
    if(Math.abs(azimVelocity) < 0.00004) azimVelocity = 0;
    if(Math.abs(polarVelocity) < 0.00004) polarVelocity = 0;
  }
  // ease the actual camera angles toward their targets — this is what makes
  // the rotation feel fluid rather than jumping in lockstep with raw touch events
  azimuth += (azimuthTarget-azimuth)*0.3;
  polar += (polarTarget-polar)*0.3;
  updateCamera();

  ringMeshes.forEach(r=>{
    const local = ((t*0.18)+r.phase)%1;
    const s = 6 + local*70;
    r.mesh.scale.set(s,s,1);
    r.mesh.material.opacity = 0.32*(1-local);
  });

  updateLabels();
  renderer.render(scene, camera);
}

function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', {timeZone:'Asia/Colombo'}) + ' SLST';
}
setInterval(updateClock, 1000); updateClock();

function onViewportResize(){
  const rect = stage.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  if(w<=0 || h<=0) return; // stage can be briefly 0-height mid-layout on some mobile browsers
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onViewportResize);
window.addEventListener('orientationchange', ()=>setTimeout(onViewportResize, 120));
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', onViewportResize);
}
// mobile browsers often settle their address-bar/viewport height a moment after load
setTimeout(onViewportResize, 300);

animate();
loadAll(); // fetches in the background; labels/pins/stats update reactively as it resolves (paintLabel/applyMarkerColor/updateStats), no need to block the reveal on it

// Reveal the terrain as soon as it's actually painted, instead of waiting on the
// weather API round-trip — that was the main source of perceived slow loading.
requestAnimationFrame(()=>{
  requestAnimationFrame(()=>{
    const ls = document.getElementById('loadscreen');
    if(ls){ ls.style.opacity='0'; setTimeout(()=>ls.remove(),650); }
  });
});
</script>
